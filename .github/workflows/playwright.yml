name: Playwright Tests

permissions:
  contents: read
  checks: write
  pull-requests: write

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build --if-present

  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 30

      - name: Upload CTRF report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ctrf-report
          path: ctrf/
          retention-days: 30

  report:
    name: Publish Test Report
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download CTRF report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: ctrf-report
          path: ctrf

      - name: Download Playwright HTML report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: playwright-report
          path: playwright-report

      - name: Publish CTRF test report
        if: needs.test.result != 'skipped'
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: './ctrf/*.json'
          title: 'Playwright Test Results'
          summary-report: true
          failed-report: true
          flaky-report: true
          skipped-report: true
          test-report: true
          collapse-large-reports: true
          report-order: 'summary-report,failed-report,flaky-report,skipped-report,test-report'
          annotate: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
